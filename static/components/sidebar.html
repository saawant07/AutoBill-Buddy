<!-- ================================================================
     AutoBill Buddy - Shared Sidebar Component
================================================================ -->
<aside id="sidebar" class="sidebar">
    <!-- Logo & Brand -->
    <div class="sidebar-header">
        <div style="display:flex;align-items:center;gap:12px;">
            <div class="sidebar-logo">
                <i class="fas fa-bolt"></i>
            </div>
            <div>
                <h1 style="color:#fff;font-weight:800;font-size:16px;margin:0;line-height:1.2;">AutoBill Buddy</h1>
                <p style="color:rgba(255,255,255,0.4);font-size:10px;margin:3px 0 0;">v2.0 &bull; retail</p>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="sidebar-nav">
        <!-- MAIN Section -->
        <div class="sidebar-section">
            <p class="sidebar-section-title">MAIN</p>

            <a href="/dashboard.html" class="sidebar-item" data-page="dashboard.html">
                <i class="sidebar-icon fas fa-th-large"></i>
                <span>Dashboard</span>
            </a>

            <a href="/billing.html" class="sidebar-item" data-page="billing.html">
                <i class="sidebar-icon fas fa-file-invoice-dollar"></i>
                <span>Billing</span>
                <span id="billing-badge" class="sidebar-badge" style="display:none;">0</span>
            </a>

            <a href="/inventory.html" class="sidebar-item" data-page="inventory.html">
                <i class="sidebar-icon fas fa-boxes-stacked"></i>
                <span>Inventory</span>
            </a>
        </div>

        <!-- MORE Section -->
        <div class="sidebar-section">
            <p class="sidebar-section-title">MORE</p>

            <a href="/customers.html" class="sidebar-item" data-page="customers.html">
                <i class="sidebar-icon fas fa-users"></i>
                <span>Customers</span>
            </a>

            <a href="/reports.html" class="sidebar-item" data-page="reports.html">
                <i class="sidebar-icon fas fa-chart-line"></i>
                <span>Reports</span>
            </a>

            <a href="/settings.html" class="sidebar-item" data-page="settings.html">
                <i class="sidebar-icon fas fa-gear"></i>
                <span>Settings</span>
            </a>
        </div>
    </nav>

    <!-- Footer: User Profile -->
    <div class="sidebar-footer">
        <!-- Authenticated: User Profile Card -->
        <div id="sidebar-authenticated" style="display:none;">
            <div style="display:flex;align-items:center;gap:10px;padding:4px;">
                <div id="sidebar-avatar" style="width:36px;height:36px;border-radius:10px;background:var(--gradient-purple);display:flex;align-items:center;justify-content:center;color:white;font-size:14px;font-weight:700;flex-shrink:0;position:relative;">
                    <i class="fas fa-user"></i>
                    <span style="position:absolute;bottom:-2px;right:-2px;width:10px;height:10px;background:#22C55E;border-radius:50%;border:2px solid var(--sidebar-bg);"></span>
                </div>
                <div style="flex:1;min-width:0;">
                    <p id="sidebar-user-name" style="color:#fff;font-size:13px;font-weight:600;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">Guest</p>
                    <p id="sidebar-user-plan" style="color:rgba(255,255,255,0.4);font-size:10px;margin:2px 0 0;">Free Plan</p>
                </div>
                <button id="sidebar-logout-btn" title="Logout" style="width:28px;height:28px;border-radius:8px;border:none;background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.4);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.15s;" onmouseover="this.style.background='rgba(239,68,68,0.2)';this.style.color='#F87171'" onmouseout="this.style.background='rgba(255,255,255,0.06)';this.style.color='rgba(255,255,255,0.4)'">
                    <i class="fas fa-right-from-bracket" style="font-size:11px;"></i>
                </button>
            </div>
        </div>
        <!-- Guest: Login Button -->
        <div id="sidebar-login-section">
            <button id="sidebar-login-btn" onclick="openLoginModal()" style="width:100%;padding:12px;border-radius:10px;border:none;background:var(--sidebar-accent);color:var(--sidebar-bg);font-size:13px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.15s;" onmouseover="this.style.opacity='0.9'" onmouseout="this.style.opacity='1'">
                <i class="fas fa-right-to-bracket"></i>
                <span>Login / Sign Up</span>
            </button>
        </div>
    </div>
</aside>

<!-- Mobile Overlay -->
<div id="sidebar-overlay" class="sidebar-overlay"></div>

<!-- Mobile Toggle Button -->
<button id="sidebar-mobile-toggle" class="sidebar-mobile-toggle">
    <i class="fas fa-bars"></i>
</button>

<!-- Login Modal -->
<div id="login-modal" class="modal-overlay hidden" style="z-index:200;">
    <div class="modal-box" style="max-width:420px;">
        <div class="modal-header">
            <h3 class="modal-title" id="login-modal-title">
                <i class="fas fa-right-to-bracket" style="color:var(--sidebar-accent)"></i>
                Login / Sign Up
            </h3>
            <button class="modal-close" onclick="closeLoginModal()"><i class="fas fa-times"></i></button>
        </div>

        <!-- Demo Notice -->
        <div style="background:var(--accent-orange-light);border-radius:10px;padding:12px;margin-bottom:16px;font-size:13px;color:var(--status-warning);">
            <i class="fas fa-info-circle"></i>
            &nbsp;<strong>Demo:</strong> Use any email/password to create an account. Your data stays private.
        </div>

        <!-- Login Form -->
        <div id="login-form-section">
            <div style="margin-bottom:14px;">
                <label style="font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.04em;display:block;margin-bottom:6px;">Email</label>
                <input type="email" id="login-email" class="input" placeholder="you@example.com" style="width:100%;">
            </div>
            <div style="margin-bottom:8px;">
                <label style="font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.04em;display:block;margin-bottom:6px;">Password</label>
                <input type="password" id="login-password" class="input" placeholder="Min 6 characters" style="width:100%;">
            </div>
            <div style="margin-bottom:16px;">
                <label style="font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.04em;display:block;margin-bottom:6px;">Shop Name (optional)</label>
                <input type="text" id="login-shop-name" class="input" placeholder="My Kirana Store" style="width:100%;">
            </div>
            <button id="login-submit-btn" class="btn btn-primary" style="width:100%;margin-bottom:10px;" onclick="submitLogin()">
                <i class="fas fa-right-to-bracket"></i> Login
            </button>
            <p style="text-align:center;font-size:13px;color:var(--text-muted);margin:0;">
                Don't have an account?
                <a href="#" onclick="event.preventDefault();showSignup()" style="color:var(--sidebar-accent);font-weight:600;">Sign Up</a>
            </p>
        </div>

        <!-- Signup Form -->
        <div id="signup-form-section" style="display:none;">
            <div style="margin-bottom:14px;">
                <label style="font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.04em;display:block;margin-bottom:6px;">Email</label>
                <input type="email" id="signup-email" class="input" placeholder="you@example.com" style="width:100%;">
            </div>
            <div style="margin-bottom:14px;">
                <label style="font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.04em;display:block;margin-bottom:6px;">Password</label>
                <input type="password" id="signup-password" class="input" placeholder="Min 6 characters" style="width:100%;">
            </div>
            <div style="margin-bottom:16px;">
                <label style="font-size:12px;font-weight:600;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.04em;display:block;margin-bottom:6px;">Shop Name</label>
                <input type="text" id="signup-shop-name" class="input" placeholder="My Kirana Store" style="width:100%;">
            </div>
            <button id="signup-submit-btn" class="btn btn-orange" style="width:100%;margin-bottom:10px;" onclick="submitSignup()">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
            <p style="text-align:center;font-size:13px;color:var(--text-muted);margin:0;">
                Already have an account?
                <a href="#" onclick="event.preventDefault();showLogin()" style="color:var(--sidebar-accent);font-weight:600;">Login</a>
            </p>
        </div>

        <div id="login-message" style="margin-top:12px;display:none;padding:10px;border-radius:10px;font-size:13px;text-align:center;"></div>
    </div>
</div>
