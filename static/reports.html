<!DOCTYPE html>
<html lang="en">
<head>
    <script>if (!window.API_BASE) window.API_BASE = window.location.hostname === 'localhost' ? 'http://localhost:8000' : '';</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - AutoBill Buddy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { fontFamily: { sans: ['Plus Jakarta Sans', 'sans-serif'] } } }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/css/variables.css">
    <link rel="stylesheet" href="/static/css/components.css">
    <style>
        .reports-layout { display: grid; grid-template-columns: 1fr 280px; gap: 24px; align-items: start; }
        @media (max-width: 1024px) { .reports-layout { grid-template-columns: 1fr; } .reports-sidebar { order: -1; } }
        .filter-btn { padding: 8px 18px; border-radius: 10px; border: 1px solid var(--border-subtle); background: var(--card-bg); color: var(--text-muted); font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s; }
        .filter-btn:hover { background: var(--input-bg); color: var(--text-heading); }
        .filter-btn.active { background: var(--accent-green-light); border-color: var(--accent-green); color: var(--accent-green); }
        .kpi-card { background: var(--card-bg); border-radius: var(--card-radius); padding: 20px; box-shadow: var(--card-shadow); display: flex; align-items: center; gap: 16px; transition: box-shadow 0.2s, transform 0.2s; }
        .kpi-card:hover { box-shadow: var(--card-shadow-hover); transform: translateY(-2px); }
        .kpi-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
        .kpi-icon-green { background: var(--accent-green-light); color: var(--accent-green); }
        .kpi-icon-blue { background: var(--accent-blue-light); color: var(--accent-blue); }
        .kpi-icon-purple { background: var(--accent-purple-light); color: var(--accent-purple); }
        .kpi-icon-red { background: var(--accent-red-light); color: var(--accent-red); }
        .kpi-label { font-size: 12px; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
        .kpi-value { font-size: 24px; font-weight: 800; color: var(--text-heading); line-height: 1.1; }
        .chart-card { background: var(--card-bg); border-radius: var(--card-radius); padding: 20px; box-shadow: var(--card-shadow); }
        .chart-card-title { font-size: 14px; font-weight: 700; color: var(--text-heading); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
        .chart-wrap { position: relative; height: 220px; }
        .chart-wrap-sm { position: relative; height: 200px; }
        .recent-table { width: 100%; border-collapse: collapse; }
        .recent-table th { text-align: left; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; padding: 12px 16px; border-bottom: 1px solid var(--border-subtle); }
        .recent-table td { padding: 14px 16px; font-size: 13px; color: var(--text-heading); border-bottom: 1px solid var(--border-subtle); }
        .recent-table tr:last-child td { border-bottom: none; }
        .recent-table tr:hover td { background: var(--input-bg); }
        .payment-pill { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
        .payment-pill-cash { background: var(--accent-green-light); color: var(--accent-green); }
        .payment-pill-udhaar { background: var(--accent-red-light); color: var(--accent-red); }
        .sidebar-card { background: var(--card-bg); border-radius: var(--card-radius); padding: 20px; box-shadow: var(--card-shadow); }
        .calendar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
        .calendar-month { font-size: 15px; font-weight: 700; color: var(--text-heading); }
        .calendar-nav { display: flex; gap: 6px; }
        .calendar-nav-btn { width: 28px; height: 28px; border-radius: 8px; border: 1px solid var(--border-subtle); background: var(--card-bg); color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
        .calendar-nav-btn:hover { background: var(--input-bg); color: var(--text-heading); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
        .calendar-day-header { text-align: center; font-size: 10px; font-weight: 700; color: var(--text-muted); padding: 6px 0; text-transform: uppercase; }
        .calendar-day { aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 8px; cursor: pointer; transition: all 0.15s; font-size: 12px; font-weight: 500; color: var(--text-muted); }
        .calendar-day:hover { background: var(--input-bg); }
        .calendar-day.empty { cursor: default; }
        .calendar-day.empty:hover { background: transparent; }
        .calendar-day.has-sales { background: var(--accent-green-light); color: var(--accent-green); font-weight: 600; }
        .calendar-day.has-sales:hover { background: rgba(16,185,129,0.2); }
        .calendar-day.today { border: 2px solid var(--accent-orange); color: var(--accent-orange); font-weight: 700; }
        .calendar-day.today.has-sales { background: var(--accent-orange-light); }
        .calendar-day.selected-day { background: var(--accent-blue-light) !important; color: var(--accent-blue) !important; border: 2px solid var(--accent-blue); font-weight: 700; }
        .calendar-day-amount { font-size: 8px; font-weight: 700; margin-top: 1px; }
        .highlight-pulse { animation: highlightPulse 1.5s ease-in-out; }
        @keyframes highlightPulse { 0%, 100% { box-shadow: none; } 50% { box-shadow: 0 0 0 4px var(--accent-green-light); } }
        #transaction-history { scroll-margin-top: 20px; }
        .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid var(--border-subtle); }
        .top-items-table { width: 100%; border-collapse: collapse; }
        .top-items-table th { text-align: left; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; padding: 10px 16px; border-bottom: 1px solid var(--border-subtle); }
        .top-items-table td { padding: 12px 16px; font-size: 13px; color: var(--text-heading); border-bottom: 1px solid var(--border-subtle); }
        .top-items-table tr:last-child td { border-bottom: none; }
        .top-items-table tr:hover td { background: var(--input-bg); }
        .progress-bar { height: 6px; border-radius: 3px; background: var(--input-bg); overflow: hidden; }
        .progress-fill { height: 100%; border-radius: 3px; background: var(--accent-green); }

        /* Responsive Grids */
        .grid-responsive-3-2 { display: grid; grid-template-columns: 3fr 2fr; gap: 20px; margin-bottom: 24px; }
        .grid-responsive-1-1 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
        
        @media (max-width: 768px) {
            .grid-responsive-3-2, .grid-responsive-1-1 {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div id="sidebar-placeholder"></div>

    <div class="main-content">
        <header class="page-header">
            <div class="page-header-left">
                <h1 class="page-title">Reports</h1>
                <p class="page-subtitle" id="report-period">Today</p>
            </div>
            <div class="page-header-right">
                <div class="flex gap-2" id="filter-bar">
                    <button class="filter-btn active" data-filter="today" onclick="setFilter('today')">Today</button>
                    <button class="filter-btn" data-filter="yesterday" onclick="setFilter('yesterday')">Yesterday</button>
                    <button class="filter-btn" data-filter="week" onclick="setFilter('week')">Last 7 Days</button>
                    <button class="filter-btn" data-filter="month" onclick="setFilter('month')">This Month</button>
                </div>
                <button id="theme-toggle-btn" class="btn-icon btn-outline"><i class="fas fa-moon"></i></button>
            </div>
        </header>

        <div class="page-content">
            <div class="reports-layout">
                <div class="reports-main">
                    <!-- KPI Cards -->
                    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 24px;">
                        <div class="kpi-card">
                            <div class="kpi-icon kpi-icon-green"><i class="fas fa-chart-line"></i></div>
                            <div>
                                <p class="kpi-label">Total Revenue</p>
                                <p class="kpi-value" id="kpi-revenue">₹0</p>
                            </div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-icon kpi-icon-blue"><i class="fas fa-receipt"></i></div>
                            <div>
                                <p class="kpi-label">Total Orders</p>
                                <p class="kpi-value" id="kpi-orders">0</p>
                            </div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-icon kpi-icon-purple"><i class="fas fa-coins"></i></div>
                            <div>
                                <p class="kpi-label">Avg Order Value</p>
                                <p class="kpi-value" id="kpi-avg">₹0</p>
                            </div>
                        </div>
                        <div class="kpi-card">
                            <div class="kpi-icon kpi-icon-red"><i class="fas fa-hand-holding-dollar"></i></div>
                            <div>
                                <p class="kpi-label">Total Dues</p>
                                <p class="kpi-value" id="kpi-dues">₹0</p>
                            </div>
                        </div>
                    </div>

                    <!-- Charts Row -->
                    <div class="grid-responsive-3-2">
                        <div class="chart-card">
                            <h3 class="chart-card-title"><i class="fas fa-chart-bar" style="color: var(--accent-green);"></i> Sales Trend</h3>
                            <div class="chart-wrap">
                                <canvas id="trend-chart"></canvas>
                                <div id="trend-loading" class="loading-state" style="position:absolute;inset:0;background:var(--card-bg);display:flex;align-items:center;justify-content:center;">
                                    <div class="spinner" style="border-top-color:var(--accent-green);"></div>
                                </div>
                            </div>
                        </div>
                        <div class="chart-card">
                            <h3 class="chart-card-title"><i class="fas fa-chart-pie" style="color: var(--accent-blue);"></i> Sales by Item</h3>
                            <div class="chart-wrap-sm">
                                <canvas id="items-chart"></canvas>
                            </div>
                        </div>
                    </div>

                    <!-- Payment Modes + Top Items -->
                    <div class="grid-responsive-1-1">
                        <div class="chart-card">
                            <h3 class="chart-card-title"><i class="fas fa-credit-card" style="color: var(--accent-purple);"></i> Payment Modes</h3>
                            <div class="chart-wrap-sm">
                                <canvas id="payment-chart"></canvas>
                            </div>
                        </div>
                        <div class="chart-card">
                            <h3 class="chart-card-title"><i class="fas fa-trophy" style="color: var(--accent-orange);"></i> Top Items</h3>
                            <div id="top-items-list" style="max-height:200px;overflow-y:auto;"></div>
                        </div>
                    </div>

                    <!-- Recent Sales -->
                    <div class="chart-card" id="transaction-history">
                        <div class="section-header" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;">
                            <h3 style="font-size:15px;font-weight:700;color:var(--text-heading);display:flex;align-items:center;gap:8px;">
                                <i class="fas fa-clock-rotate-left" style="color:var(--accent-blue);"></i> Recent Sales
                            </h3>
                        </div>
                        <div id="tx-container">
                            <div class="loading-state" id="tx-loading" style="padding:40px;">
                                <div class="spinner" style="margin:0 auto;border-top-color:var(--accent-green);"></div>
                                <p style="margin-top:12px;color:var(--text-muted);font-size:13px;">Loading...</p>
                            </div>
                            <div id="tx-empty" class="empty-state" style="display:none;padding:40px;">
                                <i class="fas fa-receipt" style="font-size:32px;opacity:0.3;"></i>
                                <p style="margin-top:10px;">No sales for this period</p>
                            </div>
                            <div id="tx-list"></div>
                        </div>
                    </div>
                </div>

                <!-- Calendar Sidebar -->
                <div class="reports-sidebar">
                    <div class="sidebar-card" style="margin-bottom:16px;">
                        <div class="calendar-header">
                            <span class="calendar-month" id="cal-month">March 2026</span>
                            <div class="calendar-nav">
                                <button class="calendar-nav-btn" onclick="changeMonth(-1)"><i class="fas fa-chevron-left" style="font-size:10px;"></i></button>
                                <button class="calendar-nav-btn" onclick="changeMonth(1)"><i class="fas fa-chevron-right" style="font-size:10px;"></i></button>
                            </div>
                        </div>
                        <div class="calendar-grid" id="cal-grid"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <div id="inline-prompt-modal" class="modal-overlay hidden" style="z-index:200;">
        <div class="modal-box" style="max-width:400px;">
            <div class="modal-header">
                <h3 class="modal-title" id="inline-prompt-title">Edit</h3>
                <button class="modal-close" onclick="app.closeInlinePrompt()"><i class="fas fa-times"></i></button>
            </div>
            <input type="text" id="inline-prompt-input" class="input" style="margin-bottom:16px;">
            <div style="display:flex;gap:10px;">
                <button class="btn btn-outline" style="flex:1" onclick="app.closeInlinePrompt()">Cancel</button>
                <button id="inline-prompt-submit" class="btn btn-primary" style="flex:1">Submit</button>
            </div>
        </div>
    </div>

    <script type="module">
        await import('/static/js/app.js');
        await import('/static/js/charts.js');

        const sidebarResp = await fetch('/static/components/sidebar.html');
        document.getElementById('sidebar-placeholder').outerHTML = await sidebarResp.text();
        app.initTheme();
        app.initSidebar();

        let activeFilter = 'today';
        let selectedDate = null; // set when a calendar day is clicked
        let calYear = new Date().getFullYear();
        let calMonth = new Date().getMonth();
        let dailyCache = {};
        let allTransactions = [];

        async function loadReport() {
            const trendLoading = document.getElementById('trend-loading');
            if (trendLoading) trendLoading.style.display = 'flex';

            try {
                const today = new Date();
                let transactions = [];
                let totalRevenue = 0, totalOrders = 0;
                let trendLabels = [], trendValues = [];
                let cashTotal = 0, udhaarTotal = 0;

                if (activeFilter === 'today') {
                    const res = await app.api('/sales/today');
                    if (res && !res.error) {
                        transactions = res.transactions || [];
                        totalRevenue = parseFloat(res.total_revenue || 0);
                        totalOrders = parseInt(res.total_sales || 0);
                        (res.transactions || []).forEach(tx => {
                            if ((tx.payment_mode || '').toLowerCase() === 'cash') cashTotal += parseFloat(tx.price || 0);
                            else udhaarTotal += parseFloat(tx.price || 0);
                        });
                        trendLabels = [today.toLocaleDateString('en-IN', { weekday: 'short' })];
                        trendValues = [totalRevenue];
                    }
                } else if (activeFilter === 'yesterday') {
                    const y = new Date(today); y.setDate(today.getDate() - 1);
                    const ds = y.toISOString().split('T')[0];
                    const res = await app.api(`/sales/date/${ds}`);
                    if (res && !res.error) {
                        transactions = res.transactions || [];
                        totalRevenue = parseFloat(res.revenue || 0);
                        totalOrders = parseInt(res.orders || 0);
                        (res.transactions || []).forEach(tx => {
                            if ((tx.payment_mode || '').toLowerCase() === 'cash') cashTotal += parseFloat(tx.price || 0);
                            else udhaarTotal += parseFloat(tx.price || 0);
                        });
                        trendLabels = [y.toLocaleDateString('en-IN', { weekday: 'short' })];
                        trendValues = [totalRevenue];
                    }
                } else if (activeFilter === 'week') {
                    for (let i = 6; i >= 0; i--) {
                        const d = new Date(today); d.setDate(today.getDate() - i);
                        const ds = d.toISOString().split('T')[0];
                        const res = await app.api(`/sales/date/${ds}`);
                        if (res && !res.error) {
                            transactions = [...transactions, ...(res.transactions || [])];
                            totalRevenue += parseFloat(res.revenue || 0);
                            totalOrders += parseInt(res.orders || 0);
                            trendLabels.push(d.toLocaleDateString('en-IN', { weekday: 'short' }));
                            trendValues.push(parseFloat(res.revenue || 0));
                            (res.transactions || []).forEach(tx => {
                                if ((tx.payment_mode || '').toLowerCase() === 'cash') cashTotal += parseFloat(tx.price || 0);
                                else udhaarTotal += parseFloat(tx.price || 0);
                            });
                        } else {
                            trendLabels.push(d.toLocaleDateString('en-IN', { weekday: 'short' }));
                            trendValues.push(0);
                        }
                    }
                } else if (activeFilter === 'month') {
                    const year = today.getFullYear(), month = today.getMonth();
                    const daysInMonth = new Date(year, month + 1, 0).getDate();
                    for (let d = 1; d <= daysInMonth; d++) {
                        const ds = `${year}-${String(month + 1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                        const res = await app.api(`/sales/date/${ds}`);
                        if (res && !res.error) {
                            transactions = [...transactions, ...(res.transactions || [])];
                            totalRevenue += parseFloat(res.revenue || 0);
                            totalOrders += parseInt(res.orders || 0);
                            trendLabels.push(String(d));
                            trendValues.push(parseFloat(res.revenue || 0));
                            (res.transactions || []).forEach(tx => {
                                if ((tx.payment_mode || '').toLowerCase() === 'cash') cashTotal += parseFloat(tx.price || 0);
                                else udhaarTotal += parseFloat(tx.price || 0);
                            });
                        } else {
                            trendLabels.push(String(d));
                            trendValues.push(0);
                        }
                    }
                }

                // Update KPIs
                const avgVal = totalOrders > 0 ? totalRevenue / totalOrders : 0;
                document.getElementById('kpi-revenue').textContent = '₹' + totalRevenue.toLocaleString('en-IN');
                document.getElementById('kpi-orders').textContent = totalOrders.toLocaleString('en-IN');
                document.getElementById('kpi-avg').textContent = '₹' + avgVal.toLocaleString('en-IN', { maximumFractionDigits: 0 });

                // Load dues
                const duesRes = await app.api('/dues');
                if (duesRes && duesRes.dues) {
                    const totalDues = duesRes.dues.reduce((s, d) => s + (d.total_due || 0), 0);
                    document.getElementById('kpi-dues').textContent = '₹' + totalDues.toLocaleString('en-IN');
                }

                if (trendLoading) trendLoading.style.display = 'none';
                allTransactions = transactions;

                // Render charts
                createRevenueChart('trend-chart', trendLabels, trendValues, 'Revenue');
                createPaymentDoughnut('payment-chart', cashTotal, udhaarTotal);

                // Sales by Item chart
                const itemMap = {};
                transactions.forEach(tx => {
                    (tx.detailed_items || []).forEach(item => {
                        const name = item.name || 'Unknown';
                        itemMap[name] = (itemMap[name] || 0) + (item.quantity || 1);
                    });
                });
                const sorted = Object.entries(itemMap).sort((a, b) => b[1] - a[1]).slice(0, 6);
                if (sorted.length > 0) {
                    createPieChart('items-chart', sorted.map(x => x[0]), sorted.map(x => x[1]));
                } else {
                    createPieChart('items-chart', ['No data'], [1]);
                }

                // Top items table
                renderTopItems(sorted, totalRevenue);

                // Transactions
                renderTransactions(transactions);

                // Calendar
                await renderCalendar();

            } catch (e) {
                console.error('Load error:', e);
                if (trendLoading) trendLoading.style.display = 'none';
            }
        }

        function renderTopItems(sorted, totalRevenue) {
            const el = document.getElementById('top-items-list');
            if (!el) return;
            if (sorted.length === 0) {
                el.innerHTML = '<p style="color:var(--text-muted);font-size:13px;text-align:center;padding:20px;">No items sold</p>';
                return;
            }
            const maxQty = sorted[0][1];
            el.innerHTML = `<div class="table-wrap"><table class="top-items-table">
                <thead><tr><th>#</th><th>Item</th><th>Qty</th><th>%</th></tr></thead>
                <tbody>
                    ${sorted.slice(0, 8).map(([name, qty], i) => {
                        const pct = totalRevenue > 0 ? Math.round((qty / maxQty) * 100) : 0;
                        return `<tr>
                            <td style="font-weight:700;color:var(--text-muted);">${i + 1}</td>
                            <td style="font-weight:600;">${app.esc(name)}</td>
                            <td style="font-weight:700;color:var(--accent-green);">${qty}</td>
                            <td style="width:80px;">
                                <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;"></div></div>
                            </td>
                        </tr>`;
                    }).join('')}
                </tbody>
            </table></div>`;
        }

        function renderTransactions(transactions) {
            const loading = document.getElementById('tx-loading');
            const empty = document.getElementById('tx-empty');
            const list = document.getElementById('tx-list');
            if (loading) loading.style.display = 'none';
            if (!transactions || transactions.length === 0) {
                if (empty) empty.style.display = 'block';
                return;
            }
            if (empty) empty.style.display = 'none';
            if (list) {
                list.innerHTML = `<div class="table-wrap"><table class="recent-table">
                    <thead><tr><th>Order ID</th><th>Customer</th><th>Date/Time</th><th>Amount</th><th>Mode</th></tr></thead>
                    <tbody>
                        ${transactions.slice(0, 50).map((tx, i) => {
                            const amt = parseFloat(tx.price || 0);
                            const isCash = (tx.payment_mode || 'cash').toLowerCase() === 'cash';
                            return `<tr>
                                <td style="font-weight:600;color:var(--text-muted);">${tx.transaction_id ? '#' + tx.transaction_id.toUpperCase() : (tx.order_id || tx.id || '#' + String(i+1).padStart(4,'0'))}</td>
                                <td style="font-weight:600;">${app.esc(tx.customer_name || 'Walk-in')}</td>
                                <td style="color:var(--text-muted);font-size:12px;">${tx.time || '-'}</td>
                                <td style="font-weight:700;color:var(--accent-green);">₹${amt.toLocaleString('en-IN')}</td>
                                <td><span class="payment-pill ${isCash ? 'payment-pill-cash' : 'payment-pill-udhaar'}">${app.esc(tx.payment_mode || 'Cash')}</span></td>
                            </tr>`;
                        }).join('')}
                    </tbody>
                </table></div>`;
            }
        }

        async function renderCalendar() {
            const grid = document.getElementById('cal-grid');
            const monthLabel = document.getElementById('cal-month');
            const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
            if (monthLabel) monthLabel.textContent = months[calMonth] + ' ' + calYear;
            const firstDay = new Date(calYear, calMonth, 1).getDay();
            const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
            const today = new Date();
            const todayStr = today.toISOString().split('T')[0];
            const cacheKey = `${calYear}-${calMonth}`;
            let monthData;
            if (dailyCache[cacheKey]) {
                monthData = dailyCache[cacheKey];
            } else {
                const monthRes = await app.api(`/sales/month?year=${calYear}&month=${calMonth + 1}`);
                monthData = monthRes?.daily_totals || {};
                dailyCache[cacheKey] = monthData;
            }
            const dayNames = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
            let html = dayNames.map(d => `<div class="calendar-day-header">${d}</div>`).join('');
            for (let i = 0; i < firstDay; i++) html += '<div class="calendar-day empty"></div>';
            for (let day = 1; day <= daysInMonth; day++) {
                const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                const dayData = monthData[ds];
                const isToday = ds === todayStr;
                const isSelected = ds === selectedDate;
                const hasSales = dayData && dayData.revenue > 0;
                let cls = 'calendar-day';
                if (isSelected) cls += ' selected-day';
                else if (isToday) cls += ' today';
                if (hasSales && !isSelected) cls += ' has-sales';
                let amtHtml = '';
                if (hasSales) {
                    const rev = dayData.revenue || 0;
                    const displayAmt = rev >= 1000 ? (rev/1000).toFixed(1) + 'k' : rev;
                    amtHtml = `<span class="calendar-day-amount">₹${displayAmt}</span>`;
                }
                html += `<div class="${cls}" onclick="openDayDetail('${ds}')" title="${ds}"><span>${day}</span>${amtHtml}</div>`;
            }
            if (grid) grid.innerHTML = html;
        }

        window.setFilter = (filter) => {
            activeFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            const btn = document.querySelector(`.filter-btn[data-filter="${filter}"]`);
            if (btn) btn.classList.add('active');
            const labels = { today: 'Today', yesterday: 'Yesterday', week: 'Last 7 Days', month: 'This Month' };
            document.getElementById('report-period').textContent = labels[filter] || filter;
            loadReport();
        };

        window.changeMonth = async (delta) => {
            calMonth += delta;
            if (calMonth > 11) { calMonth = 0; calYear++; }
            if (calMonth < 0) { calMonth = 11; calYear--; }
            await renderCalendar();
        };

        window.openDayDetail = async (dateStr) => {
            // Clear filter button active states
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            // Set selected date state
            selectedDate = dateStr;
            // Update subtitle
            const d = new Date(dateStr + 'T00:00:00');
            document.getElementById('report-period').textContent = d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });

            const res = await app.api(`/sales/date/${dateStr}`);
            if (res && !res.error) {
                allTransactions = res.transactions || [];

                // KPIs
                const totalRev = parseFloat(res.revenue || 0);
                const totalOrd = parseInt(res.orders || 0);
                const avgVal = totalOrd > 0 ? totalRev / totalOrd : 0;
                document.getElementById('kpi-revenue').textContent = '₹' + totalRev.toLocaleString('en-IN');
                document.getElementById('kpi-orders').textContent = totalOrd.toLocaleString('en-IN');
                document.getElementById('kpi-avg').textContent = '₹' + avgVal.toLocaleString('en-IN', { maximumFractionDigits: 0 });

                // Sales Trend — hourly breakdown (X-axis: 00:00 – 23:00)
                const hourlyRev = new Array(24).fill(0);
                (res.transactions || []).forEach(tx => {
                    const h = parseInt(tx.time ? tx.time.split(':')[0] : 12);
                    hourlyRev[h] = (hourlyRev[h] || 0) + parseFloat(tx.price || 0);
                });
                const hourlyLabels = hourlyRev.map((_, i) => String(i).padStart(2, '0') + ':00');
                createRevenueChart('trend-chart', hourlyLabels, hourlyRev, 'Revenue by Hour');

                // Payment doughnut
                let cashTotal = 0, udhaarTotal = 0;
                (res.transactions || []).forEach(tx => {
                    if ((tx.payment_mode || '').toLowerCase() === 'cash') cashTotal += parseFloat(tx.price || 0);
                    else udhaarTotal += parseFloat(tx.price || 0);
                });
                createPaymentDoughnut('payment-chart', cashTotal, udhaarTotal);

                // Sales by Item pie
                const itemMap = {};
                (res.transactions || []).forEach(tx => {
                    (tx.detailed_items || []).forEach(item => {
                        const name = item.name || 'Unknown';
                        itemMap[name] = (itemMap[name] || 0) + (item.quantity || 1);
                    });
                });
                const sorted = Object.entries(itemMap).sort((a, b) => b[1] - a[1]).slice(0, 6);
                if (sorted.length > 0) {
                    createPieChart('items-chart', sorted.map(x => x[0]), sorted.map(x => x[1]));
                } else {
                    createPieChart('items-chart', ['No data'], [1]);
                }

                // Top items table
                renderTopItems(sorted, totalRev);

                // Transactions
                renderTransactions(allTransactions);

                // Re-render calendar to reflect selection
                renderCalendar();
            }
        };

        window.onLogin = () => loadReport();
        await app.initApp();

        // scrollTo from dashboard
        if (window.location.search.includes('scrollTo=transactions')) {
            setTimeout(() => {
                const el = document.getElementById('transaction-history');
                if (el) {
                    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    el.classList.add('highlight-pulse');
                    setTimeout(() => el.classList.remove('highlight-pulse'), 2000);
                }
            }, 300);
        }

        // Load initial data
        loadReport();
    </script>
</body>
</html>
