                            body { background: #fff; }
                            .receipt { box-shadow: none; border: none; }
                            @page { margin: 0; size: 80mm auto; }
                        }
                    </style>
                </head>
                <body>
                <div class="receipt" id="receipt-content">
                    <div class="receipt-header">
                        <h2>AutoBill Buddy</h2>
                        <p>Thank you for your visit!</p>
                    </div>
                    <hr class="receipt-divider">
                    <p class="receipt-info">Bill: <strong>${billNo}</strong> &nbsp;|&nbsp; ${time}</p>
                    <p class="receipt-info">Customer: <strong>${customer}</strong></p>
                    <hr class="receipt-divider">
                    <table class="receipt-items">
                        ${itemsHtml}
                        <tr class="receipt-total-row">
                            <td style="padding:8px 0 2px;font-size:15px;font-weight:700;">TOTAL</td>
                            <td style="padding:8px 0 2px;font-size:15px;font-weight:700;text-align:right;">₹${amt.toLocaleString('en-IN')}</td>
                        </tr>
                    </table>
                    <hr class="receipt-divider">
                    <p class="receipt-info" style="margin-top:8px;">Payment: <strong>${method}</strong></p>
                    <div class="receipt-footer">
                        <hr class="receipt-divider">
                        <p>Thank you! Visit again!</p>
                    </div>
                </div>
                </body>
                </html>`;

            // Show preview modal
            document.getElementById('receipt-preview-content').innerHTML = receiptHTML;
            document.getElementById('receipt-preview-modal').classList.remove('hidden');

            // Store for print action
            window._currentReceiptHTML = receiptHTML;

            // Inject print CSS once
            if (!document.getElementById('receipt-print-style')) {
                const style = document.createElement('style');
                style.id = 'receipt-print-style';
                style.innerHTML = `
                    @media print {
                        body > * { display: none !important; }
                        #receipt-preview-modal { display: block !important; position: fixed !important; left: 0 !important; top: 0 !important; width: auto !important; height: auto !important; opacity: 1 !important; visibility: visible !important; background: white !important; border: none !important; box-shadow: none !important; z-index: 999999 !important; margin: 0 !important; }
                        #receipt-preview-modal > * { display: block !important; visibility: visible !important; background: white !important; border: none !important; box-shadow: none !important; }
                        #receipt-preview-content { max-height: none !important; overflow: visible !important; padding: 20px !important; }
                        .receipt { width: 300px !important; padding: 20px !important; box-shadow: none !important; border: none !important; background: white !important; }
                        .receipt * { visibility: visible !important; }
                        .receipt-header { text-align: center !important; }
                        @page { margin: 0; size: 80mm auto; }
                    }
                `;
                document.head.appendChild(style);
            }
        };

        window.printReceiptFromPreview = () => {
            window.print();
        };

        window.downloadReceiptPDF = () => {
            window.print();
        };

        window.printReceiptByIndex = (idx) => {
            const tx = window._recentTxsByIndex && window._recentTxsByIndex[idx];
            if (!tx) { app.showToast('Transaction data not found', 'error'); return; }
            showReceiptPreview(tx);
            // After showing preview, directly print
            setTimeout(() => { window.print(); }, 300);
        };

        window.closeReceiptPreview = () => {
            document.getElementById('receipt-preview-modal').classList.add('hidden');
        };

        window.printRecentTransactions = () => {
            if (!cachedRecentTxs || cachedRecentTxs.length === 0) {
                app.showToast('No transactions to print', 'warning');
                return;
            }
            const printWindow = window.open('', '_blank', 'width=400,height=600');
            printWindow.document.write(`
                <html><head><title>Recent Transactions</title>
                <style>
                    body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: 0 auto; }
                    h3 { text-align: center; }
                    table { width: 100%; border-collapse: collapse; font-size: 13px; }
                    th, td { padding: 6px 8px; text-align: left; border-bottom: 1px solid #eee; }
                    th { font-weight: 700; background: #f5f5f5; }
                    .right { text-align: right; }
                </style></head><body>
                <h3>Recent Transactions - ${new Date().toLocaleDateString('en-IN')}</h3>
                <table><tr><th>Customer</th><th>Time</th><th class="right">Amount</th><th>Mode</th></tr>
                ${cachedRecentTxs.map(tx => `<tr><td>${tx.customer_name || 'Walk-in'}</td><td>${tx.time || ''}</td><td class="right">₹${parseFloat(tx.price||0).toLocaleString('en-IN')}</td><td>${tx.payment_mode || 'Cash'}</td></tr>`).join('')}
                </table></body></html>
            `);
            printWindow.document.close();
            printWindow.print();
        };

        // ---- CUSTOMER AUTOCOMPLETE ----
        let cachedDues = [];

        async function loadDues() {
            try {
                const res = await app.api('/dues');
                if (res && !res.error) {
                    if (Array.isArray(res)) cachedDues = res;
                    else if (res.dues && Array.isArray(res.dues)) cachedDues = res.dues;
                    else cachedDues = [];
                }
            } catch(e) { cachedDues = []; }
        }

        window.handleCustomerSearch = debounce(function(query) {
            const dropdown = document.getElementById('customer-autocomplete');
            if (!query || query.length < 2 || !cachedDues || cachedDues.length === 0) {
                dropdown.style.display = 'none';
                return;
            }
            const q = query.toLowerCase();
            const matches = cachedDues.filter(d => (d.customer_name || '').toLowerCase().includes(q)).slice(0, 6);
            if (matches.length === 0) { dropdown.style.display = 'none'; return; }
            dropdown.innerHTML = matches.map(d => `
                <div class="cust-item" onclick="selectCustomerFromDues('${app.esc(d.customer_name)}', ${d.total_due || 0})">
                    <div style="font-weight:600;font-size:12px;color:var(--text-heading);">${app.esc(d.customer_name)}</div>
                    <span class="cust-due">₹${parseFloat(d.total_due || 0).toLocaleString('en-IN')} due</span>
                </div>
            `).join('');
            dropdown.style.display = 'block';
        }, 200);

        window.selectCustomerFromDues = (name, due) => {
            document.getElementById('customer-name').value = name;
            document.getElementById('customer-autocomplete').style.display = 'none';
            if (due > 0) {
                setPaymentMethod('Udhaar');
                app.showToast(`${name} has ₹${due.toLocaleString('en-IN')} existing credit`, 'info');
            }
        };

        document.addEventListener('click', (e) => {
            if (!e.target.closest('#customer-name') && !e.target.closest('#customer-autocomplete'))
                document.getElementById('customer-autocomplete').style.display = 'none';
        });

        // ---- INIT ----
        window.onLogin = () => {
            loadInventory();
            loadRecentTransactions();
            loadDues();
            // Show the persistent voice button after login (never auto-start mic)
            const pBtn = document.getElementById('voice-persistent-btn');
            if (pBtn) pBtn.style.display = 'flex';
        };
        await app.initApp();
        await loadInventory();
        await loadRecentTransactions();
        await loadDues();
        updateTotals();
    </script>
</body>
</html>
